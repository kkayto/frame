<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repre</title>
    <link rel="stylesheet" href="atividades.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="fundo-pagina">

        <div class="frame-celular">

            <div class="notificacoes-ilustrativo">
                <span class="horario">5:67</span>
                <div class="carga-celular">
                    <i class="fa-solid fa-battery-three-quarters"></i>
                </div>
            </div>
            <header>
                <div>
                    <h2 class="sub-text">Atividades</h2>
                    <div class="sub-sub-text"> Turma do 3° DS</div>
                </div>

                <div class="sininho"><i class="fa-regular fa-bell" style="color: #584391; cursor: pointer;"></i>


                </div>
            </header>
            <div class="content">
                <section class="cate-atividades-section">
                    <p class="cate-atividades-title">Pesquisar por status</p>
                    <div class="cate-atividades-scroll-wrap" id="resumoScroll">
                        <div class="cate-atividades-inner">
                            <div class="cate-atividades-card azul">
                                <span class="cate-atividades-num">Todas</span>
                            </div>
                            <div class="cate-atividades-card amarelo">
                                <span class="cate-atividades-num">Pendentes</span>
                            </div>
                            <div class="cate-atividades-card vermei">
                                <span class="cate-atividades-num">Em Atraso</span>
                            </div>
                            <div class="cate-atividades-card verde">
                                <span class="cate-atividades-num">Concluídas</span>
                            </div>
                        </div>
                    </div>
                </section>


                <div class="wrapper-atividades">
                    <div class="cards-container" id="cards-container">
                    </div>
                </div>

            </div>
            <div class="footer">
                <a href="home.html" class="footer-item">
                    <i class="fa-solid fa-house" style="color: #584391;"></i>
                    <span class="a-text">Início</span>
                </a>
                <a href="#" class="footer-item">
                    <i class="fa-solid fa-book" style="color: #584391;"></i>
                    <span class="a-text">Atividades</span>
                </a>
                <a href="#" class="footer-item">
                    <i class="fa-solid fa-chart-line" style="color: #584391;"></i>
                    <span class="a-text">Desempenho</span>
                </a>
                <div class="footer-item submenu-wrapper">
                    <button class="footer-toggle"
                        onclick="document.querySelector('.submenu-mais').classList.toggle('aberto')">
                        <i class="fa-solid fa-bars" style="color: #584391;"></i>
                        <span class="a-text">Mais</span>
                    </button>
                    <div class="submenu-mais">
                        <div class="arrow"></div>
                        <a href="#"> <i class="fa-solid fa-gear" style="color: #584391;"></i>
                            Configurações</a>
                        <a href="#"> <i class="fa-solid fa-calendar" style="color: #584391;"></i>
                            Calendário</a>
                        <a href="#"> <i class="fa-solid fa-users" style="color: #584391;"></i> Gremio e
                            Atletica</a>
                    </div>
                </div>
            </div>
            <div class="home-linha"></div>
        </div>

        <script src="atividades.js"></script>
</body>

</html>
